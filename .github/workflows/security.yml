name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly catch for newly disclosed CVEs against unchanged code.
    - cron: "0 6 * * 1"

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          # Use the latest stable Go so this job catches runtime/stdlib CVEs
          # patched past the go.mod minimum, not just module-level CVEs.
          go-version: stable

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
